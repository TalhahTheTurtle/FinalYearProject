# IL+PPO hybrid with value-head warmup.
#
# Builds on hybrid_500k_v2_gentle.yaml but adds a warmup phase before PPO's
# main training loop. During warmup, ONLY the value head trains (everything
# else frozen) on rollouts collected by the BC-transplanted policy. This
# gives PPO a critic with sensible value estimates before any policy updates
# happen, preventing the policy collapse seen in earlier hybrid attempts.
#
# Run with:
#   python scripts/train_hybrid_warmup.py --config configs/hybrid_warmup.yaml

run_name: hybrid_warmup_v1
bc_ckpt: logs/bc_no_class_weights/bc_model.pt

env:
  world: 1
  stage: 1
  version: 0
  action_set: simple
  frame_skip: 4
  frame_stack: 4
  resize_shape: 84
  reward_shaping: true
  episodic_life: true
  stuck_threshold: 30   # steps without x_pos progress before random action override

vec_env:
  n_envs: 8
  use_subproc: true
  base_seed: 42


warmup:
  n_warmup_steps: 50_000     # ~5-7 min on a 3060 Ti
  rollout_size: 2048         # env steps per rollout (across all parallel envs)
  minibatch_size: 256
  n_grad_passes_per_rollout: 4
  lr: 1.0e-3                 # value head only, can be aggressive


# Slightly less conservative than v2_gentle because the value warmup should
# now be doing the work of preventing policy drift.
ppo:
  policy: CnnPolicy
  policy_kwargs:
    share_features_extractor: true
  learning_rate: 1.0e-4
  n_steps: 512
  batch_size: 256
  n_epochs: 4
  gamma: 0.95
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  verbose: 1

train:
  total_timesteps: 500_000
  seed: 42
  log_dir: logs
  save_freq: 100_000
  eval_freq: 50_000
  eval_episodes: 10

eval:
  deterministic: true
  render: false
  record_video: false
