# Default IL config.
#
# Reads demos from data/demos/world1_1/ 
# and produces a policy that mimics human play.
#
# Run with:
#  python scripts/train_bc.py --config configs/bc_default.yaml

run_name: bc_default

bc:
  demo_dir: data/demos/world1_1   # relative to project root
  n_actions: 7                    # SIMPLE_MOVEMENT has 7 discrete actions
  batch_size: 128
  lr: 3.0e-4
  epochs: 30                      # with early stopping, may finish sooner
  val_frac: 0.15                  # episode-level split
  early_stop_patience: 4          # stop if val_loss doesn't improve for N epochs
  use_class_weights: false         # inverse-frequency weighting for action imbalance
  seed: 0
  device: auto
  log_dir: logs
