run_name: hybrid_1-1_v3

bc_ckpt: logs/bc_no_class_weights/bc_model.pt
demo_dir: data/demos/world1_1

env:
  world: 1
  stage: 1
  version: 0
  action_set: simple
  frame_skip: 4
  frame_stack: 4
  resize_shape: 84
  reward_shaping: true
  episodic_life: true
  flag_bonus: 500.0
  step_penalty: 0.0
  death_penalty: -15.0
  stuck_threshold: 30

vec_env:
  n_envs: 8
  use_subproc: true
  base_seed: 42

warmup:
  n_warmup_steps: 50_000
  rollout_size: 2048
  minibatch_size: 256
  n_grad_passes_per_rollout: 4
  lr: 1.0e-3

bc_aux:
  bc_coef_start: 0.5
  bc_coef_end: 0.02
  bc_batch_size: 256

ppo:
  policy: CnnPolicy
  policy_kwargs:
    share_features_extractor: true
  learning_rate: 1.0e-4
  n_steps: 512
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.02
  vf_coef: 0.5
  max_grad_norm: 0.5
  verbose: 1

train:
  total_timesteps: 2_000_000
  seed: 42
  log_dir: logs
  save_freq: 100_000
  eval_freq: 50_000
  eval_episodes: 10

eval:
  deterministic: true
  render: false
  record_video: false
