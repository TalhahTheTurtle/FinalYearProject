# Default PPO training config for Super Mario Bros.
#
# Defaults are adapted from SB3's Atari PPO settings with Mario-specific tweaks.
# This config is tuned for World 1-1 on a single GPU (RTX 3060 Ti-class).
#
# To make an ablation, copy this file to configs/<name>.yaml and change the
# fields you want. Pass with:
#   python scripts/train_ppo.py --config configs/<name>.yaml

# Human-readable name appearing in logs/<run_name>/
run_name: ppo_default

# ---- Environment ----
env:
  world: 1
  stage: 1
  version: 0
  action_set: simple        # right_only | simple | complex
  frame_skip: 4
  frame_stack: 4
  resize_shape: 84
  reward_shaping: true
  episodic_life: true

# ---- Vectorisation ----
vec_env:
  n_envs: 8
  use_subproc: true
  base_seed: 42

# ---- PPO hyperparameters ----
# Mario has relatively dense reward (x-position change every step) so a shorter
# horizon (gamma=0.9) is fine. Longer horizons tend to over-value uncertain
# future states and destabilise early learning on this env.
ppo:
  policy: CnnPolicy
  learning_rate: 2.5e-4
  n_steps: 512              # per-env rollout => batch = 512 * 8 = 4096
  batch_size: 256
  n_epochs: 4
  gamma: 0.9
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01            # entropy bonus for exploration
  vf_coef: 0.5
  max_grad_norm: 0.5
  verbose: 1

# ---- Training ----
train:
  total_timesteps: 200_000  # short smoke run; bump to 4_000_000 for real training
  seed: 42
  log_dir: logs             # individual runs get logs/<run_name>/
  save_freq: 50_000         # checkpoint every N env steps
  eval_freq: 25_000         # evaluate every N env steps
  eval_episodes: 5

# ---- Eval-only settings ----
eval:
  deterministic: true
  render: false
  record_video: false       # set true to save an mp4 of each eval
