# BC + PPO concurrent training -- v2
#
# Changes from v1:
#   - step_penalty removed (was causing oscillation: long episodes got penalised,
#     so the policy learned to die quickly instead of move forward)
#   - learning_rate halved (stabilises training, reduces oscillation amplitude)
#   - bc_coef_start raised to 0.8 (stronger anchoring to BC demos early on)
#   - ent_coef raised to 0.05 (more exploration to push past x=1786 stall)
#
# Run:
#   python scripts/train_hybrid_concurrent.py --config configs/hybrid_concurrent_v2.yaml

run_name: hybrid_concurrent_v2

bc_ckpt: logs/bc_default/bc_model.pt
demo_dir: data/demos/world1_1

env:
  world: 1
  stage: 1
  version: 0
  action_set: simple
  frame_skip: 4
  frame_stack: 4
  resize_shape: 84
  reward_shaping: true
  episodic_life: true
  flag_bonus: 500.0     # level completion always dominates
  step_penalty: 0.0     # removed -- was causing policy to prefer dying over moving
  death_penalty: -15.0
  stuck_threshold: 30   # steps without x_pos progress before random action override

vec_env:
  n_envs: 8
  use_subproc: true
  base_seed: 42

# ---- BC auxiliary loss ----
bc_aux:
  bc_coef_start: 0.8    # stronger anchoring early -- keeps policy near demos longer
  bc_coef_end: 0.02
  bc_batch_size: 256

# ---- Value-head warmup before PPO ----
warmup:
  n_warmup_steps: 50_000
  rollout_size: 2048
  minibatch_size: 256
  n_grad_passes_per_rollout: 4
  lr: 1.0e-3

# ---- PPO hyperparameters ----
ppo:
  policy: CnnPolicy
  policy_kwargs:
    share_features_extractor: true
  learning_rate: 5.0e-5  # halved from v1 -- reduces oscillation
  n_steps: 512
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.15
  ent_coef: 0.05         # raised -- need more exploration to push past stall
  vf_coef: 0.5
  max_grad_norm: 0.5
  verbose: 1

train:
  total_timesteps: 1_000_000
  seed: 42
  log_dir: logs
  save_freq: 100_000
  eval_freq: 50_000
  eval_episodes: 10

eval:
  deterministic: true
  render: false
  record_video: false
